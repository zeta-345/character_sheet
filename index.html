<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐릭터 프로필</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A3A2A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="캐릭터 프로필">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&family=Noto+Serif+KR:wght@400;500;600;700&family=Gothic+A1:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE0CC;
    --paper-dark:#DBCBAB;
    --paper-shadow:#C6AF85;
    --card-bg:#F3EBDA;
    --ink:#332A20;
    --ink-soft:#6E5D48;
    --stamp-red:#A6674F;
    --stamp-red-soft:#A6674F99;
    --folder-navy:#4A3A2A;
    --tape:#C08A52;
    --pencil:#93805F;
    --line:#C6AF85;
    --danger:#A6674F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; overflow-x:hidden;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, #00000012, transparent 60%),
      var(--paper);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(0,0,0,0.035) 0, transparent 1.5px),
      radial-gradient(circle at 60% 70%, rgba(0,0,0,0.03) 0, transparent 1.5px),
      var(--paper);
    background-size: 3px 3px, 3px 3px, auto;
    color:var(--ink);
    font-family:'Noto Serif KR', serif;
    min-height:100vh;
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 80px;
  }

  /* ---------- header ---------- */
  .masthead{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    border-bottom:3px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:6px;
    flex-wrap:wrap;
    gap:12px;
  }
  .masthead h1{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:clamp(26px,4vw,38px);
    letter-spacing:2px;
    margin:0;
  }
  .masthead .case-no{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:1px;
  }
  .masthead-sub{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    gap:16px;
    padding:8px 2px 18px;
    letter-spacing:0.5px;
    flex-wrap:wrap;
  }

  /* ---------- view tabs ---------- */
  .view-tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .view-tab{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:12px;
    letter-spacing:1px;
    background:var(--card-bg);
    border:1px solid var(--ink);
    color:var(--ink-soft);
    padding:9px 16px;
    border-radius:2px 2px 0 0;
    cursor:pointer;
  }
  .view-tab:hover{color:var(--ink);}
  .view-tab.active{
    background:var(--ink);
    color:var(--card-bg);
    border-color:var(--ink);
  }

  /* ---------- network view ---------- */
  .network-view{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:2px;
    padding:20px;
    min-height:500px;
  }
  .network-empty{
    padding:80px 30px;
    text-align:center;
    font-family:'Nanum Gothic Coding', monospace;
    color:var(--ink-soft);
  }
  .network-node-name{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
  }
  .network-edge-label{
    font-family:'Nanum Gothic Coding', monospace;
  }
  .network-legend{
    display:flex;
    align-items:center;
    gap:14px;
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .network-legend .swatch{
    display:inline-block;
    width:22px; height:8px;
    border-radius:4px;
    margin-right:5px;
    vertical-align:middle;
  }

  /* ---------- layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:280px 1fr;
    gap:22px;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- cabinet (left list) ---------- */
  .cabinet{
    background:var(--folder-navy);
    border-radius:2px;
    padding:14px;
    box-shadow:0 6px 0 #00000022, inset 0 0 0 1px #ffffff14;
    height:fit-content;
  }
  .cabinet-title{
    font-family:'Nanum Gothic Coding', monospace;
    color:#EEEAE0;
    font-size:12px;
    letter-spacing:2px;
    margin:0 0 10px 4px;
    opacity:0.85;
  }
  .new-btn{
    width:100%;
    background:var(--stamp-red);
    color:#F4F2EA;
    border:none;
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:1px;
    padding:11px 10px;
    border-radius:2px;
    cursor:pointer;
    margin-bottom:12px;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 3px 0 #1B3450;
  }
  .new-btn:hover{transform:translateY(-1px);}
  .new-btn:active{transform:translateY(2px); box-shadow:0 1px 0 #1B3450;}

  .folder-list{
    display:flex;
    flex-direction:column;
    gap:7px;
  }
  .folder-tab{
    position:relative;
    background:var(--card-bg);
    border-radius:2px 8px 8px 2px;
    padding:10px 12px 10px 14px;
    cursor:pointer;
    border-left:5px solid var(--pencil);
    transition:border-color .15s ease, transform .1s ease;
  }
  .folder-tab:hover{transform:translateX(2px);}
  .folder-tab.active{
    border-left-color:var(--stamp-red);
    background:#F3F0E7;
  }
  .folder-tab .ft-name{
    font-weight:600;
    font-size:14.5px;
    display:block;
  }
  .folder-tab .ft-meta{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    display:block;
    margin-top:2px;
    letter-spacing:0.5px;
  }
  .empty-cabinet{
    font-family:'Nanum Gothic Coding', monospace;
    color:#EEEAE0cc;
    font-size:12px;
    text-align:center;
    padding:20px 6px;
    line-height:1.6;
  }

  /* ---------- dossier (right main) ---------- */
  .dossier{
    background:var(--card-bg);
    border-radius:2px;
    box-shadow:0 8px 0 #00000014, inset 0 0 0 1px #ffffff40;
    padding:0;
    position:relative;
    overflow:hidden;
  }
  .dossier-top{
    display:flex;
    gap:20px;
    padding:24px 26px 18px;
    border-bottom:2px dashed var(--line);
    position:relative;
  }
  .photo-box{
    width:96px;
    height:120px;
    flex:0 0 auto;
    background:repeating-linear-gradient(135deg, #E3E0D4, #E3E0D4 6px, #D4CFBC 6px, #D4CFBC 12px);
    border:2px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Nanum Gothic Coding', monospace;
    font-size:10px;
    color:var(--ink-soft);
    text-align:center;
    position:relative;
    cursor:pointer;
    overflow:hidden;
    padding:6px;
    line-height:1.5;
  }
  .photo-box:hover{filter:brightness(0.94);}
  .photo-box.has-photo{padding:0;}
  .photo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .photo-box .photo-remove{
    position:absolute;
    bottom:3px; right:3px;
    background:#1E2024cc;
    color:#F4F2EA;
    border:none;
    font-family:'Nanum Gothic Coding', monospace;
    font-size:9px;
    padding:3px 6px;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:0.5px;
  }
  .photo-box .photo-remove:hover{background:var(--stamp-red);}
  #photoFileInput{display:none;}
  .photo-box::before,.photo-box::after{
    content:'';
    position:absolute;
    width:10px;height:10px;
    border:1px solid var(--ink);
    top:-1px;
  }
  .photo-box::before{left:-1px;}
  .photo-box::after{right:-1px;}

  .id-fields{flex:1; min-width:0;}
  .field-row{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:9px;
    flex-wrap:wrap;
  }
  .field-row label{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:1px;
    flex:0 0 64px;
  }
  input[type=text], textarea, select{
    font-family:'Noto Serif KR', serif;
    font-size:15px;
    color:var(--ink);
    background:transparent;
    border:none;
    border-bottom:1.5px solid var(--line);
    padding:3px 2px;
    flex:1;
    min-width:120px;
    outline:none;
    transition:border-color .15s ease;
  }
  input[type=text]:focus, textarea:focus, select:focus{
    border-bottom-color:var(--stamp-red);
  }
  .name-input{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:22px !important;
    border-bottom:2px solid var(--ink) !important;
  }
  textarea{
    resize:vertical;
    min-height:52px;
    line-height:1.6;
    width:100%;
    display:block;
  }

  .stamps{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-top:6px;
  }
  .stamp{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:13px;
    color:var(--stamp-red);
    border:2.5px solid var(--stamp-red);
    border-radius:6px;
    padding:4px 10px;
    letter-spacing:1px;
    transform:rotate(-4deg);
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#2F5A850d;
    mix-blend-mode:multiply;
  }
  .stamp.alt{
    color:var(--folder-navy);
    border-color:var(--folder-navy);
    transform:rotate(3deg);
    background:#1E2A3A0d;
  }
  .stamp select{
    border:none;
    color:inherit;
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    padding:0;
    min-width:auto;
    -webkit-appearance:none;
    appearance:none;
  }

  .dossier-body{padding:20px 26px 28px;}
  .section{margin-bottom:20px;}
  .section-head{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }
  .section-head .tag{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    background:var(--ink);
    color:var(--card-bg);
    padding:2px 8px;
    border-radius:2px;
    letter-spacing:1px;
  }
  .section-head h3{
    font-family:'Gothic A1', sans-serif;
    font-size:14px;
    margin:0;
    color:var(--ink-soft);
    font-weight:500;
  }
  .two-col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media (max-width:480px){
    .dossier-top{flex-direction:column;}
    .photo-box{width:84px; height:104px;}
    .stamps{flex-direction:column; align-items:stretch;}
    .stamp{transform:none; justify-content:space-between; width:100%;}
    .stamp.alt{transform:none;}
  }
  @media (max-width:640px){.two-col{grid-template-columns:1fr;}}

  /* relationships */
  .rel-list{display:flex; flex-direction:column; gap:8px;}
  .rel-row{
    display:grid;
    grid-template-columns:1fr auto 1fr auto;
    gap:8px;
    align-items:center;
    background:#00000006;
    padding:8px 10px;
    border-radius:2px;
  }
  .rel-row input{border-bottom:1px solid var(--line); font-size:13.5px;}
  .rel-compat{
    grid-column:1 / -1;
    display:none;
    align-items:center;
    gap:8px;
    padding:6px 2px 2px;
    margin-top:2px;
    border-top:1px dashed var(--line);
  }
  .rel-compat .compat-score{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:12px;
    padding:2px 8px;
    border-radius:10px;
    border:1.5px solid currentColor;
  }
  .rel-compat .compat-label{
    font-family:'Gothic A1', sans-serif;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .rel-compat .compat-na{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.7;
  }
  .rel-compat.tier-great .compat-score{color:var(--folder-navy);}
  .rel-compat.tier-good .compat-score{color:var(--folder-navy); opacity:0.85;}
  .rel-compat.tier-ok .compat-score{color:var(--ink-soft);}
  .rel-compat.tier-bad .compat-score{color:var(--stamp-red);}
  .rel-compat.tier-poor .compat-score{color:var(--danger);}
  .rel-row .string{
    width:28px;
    height:2px;
    background:var(--stamp-red);
    justify-self:center;
  }
  .icon-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    padding:5px 8px;
    border-radius:2px;
    cursor:pointer;
  }
  .icon-btn:hover{border-color:var(--stamp-red); color:var(--stamp-red);}
  .add-rel-btn{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:12px;
    background:none;
    border:1.5px dashed var(--pencil);
    color:var(--ink-soft);
    padding:8px;
    width:100%;
    border-radius:2px;
    cursor:pointer;
    margin-top:8px;
  }
  .add-rel-btn:hover{border-color:var(--stamp-red); color:var(--stamp-red);}

  .footer-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 26px 22px;
    border-top:2px dashed var(--line);
    flex-wrap:wrap;
    gap:10px;
  }
  .del-btn{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:12px;
    color:var(--danger);
    background:none;
    border:1px solid var(--danger);
    padding:8px 14px;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:1px;
  }
  .del-btn:hover{background:var(--danger); color:#fff;}
  .cancel-btn{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:12px;
    color:var(--ink-soft);
    background:none;
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:1px;
  }
  .cancel-btn:hover{background:var(--ink-soft); color:var(--card-bg); border-color:var(--ink-soft);}
  .saved-note{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.8;
  }

  /* empty state */
  .empty-dossier{
    padding:80px 30px;
    text-align:center;
    font-family:'Nanum Gothic Coding', monospace;
    color:var(--ink-soft);
  }
  .empty-dossier .big{
    font-size:16px;
    margin-bottom:10px;
    color:var(--ink);
  }
  .empty-dossier button{
    margin-top:16px;
    font-family:'Nanum Gothic Coding', monospace;
    background:var(--stamp-red);
    color:#F4F2EA;
    border:none;
    padding:10px 18px;
    border-radius:2px;
    cursor:pointer;
    font-size:13px;
  }

  /* toolbar */
  .toolbar{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .toolbar button{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    background:var(--card-bg);
    border:1px solid var(--ink);
    color:var(--ink);
    padding:7px 10px;
    border-radius:2px;
    cursor:pointer;
  }
  .toolbar button:hover{background:var(--ink); color:var(--card-bg);}
  #importFile{display:none;}

  ::placeholder{color:#A79876;}

  /* ---------- diagnosis (quiz) trigger ---------- */
  .diag-btn{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:10px;
    letter-spacing:0.5px;
    background:none;
    border:1px solid currentColor;
    color:inherit;
    opacity:0.75;
    padding:2px 7px;
    border-radius:10px;
    cursor:pointer;
    margin-left:2px;
    transform:rotate(0deg) !important;
  }
  .diag-btn:hover{opacity:1; background:currentColor; color:var(--card-bg);}

  /* ---------- quiz modal ---------- */
  .quiz-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:#1E2024aa;
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .quiz-overlay.open{display:flex;}
  .quiz-modal{
    background:var(--card-bg);
    width:100%;
    max-width:560px;
    max-height:86vh;
    overflow-y:auto;
    border-radius:3px;
    box-shadow:0 14px 0 #00000022, inset 0 0 0 1px #ffffff40;
    padding:24px 26px 22px;
    position:relative;
  }
  .quiz-modal h2{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:16px;
    letter-spacing:1px;
    margin:0 0 4px;
    padding-bottom:12px;
    border-bottom:2px dashed var(--line);
  }
  .quiz-sub{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin:10px 0 18px;
  }
  .quiz-close{
    position:absolute;
    top:16px; right:16px;
    background:none;
    border:none;
    font-family:'Nanum Gothic Coding', monospace;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .quiz-close:hover{color:var(--stamp-red);}
  .quiz-q{margin-bottom:18px;}
  .quiz-q .qn{
    font-family:'Gothic A1', sans-serif;
    font-size:13.5px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:8px;
  }
  .quiz-opts{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .quiz-opt{
    display:flex;
    align-items:flex-start;
    gap:8px;
    font-family:'Noto Serif KR', serif;
    font-size:13.5px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:2px;
    cursor:pointer;
    background:#00000004;
    transition:border-color .12s ease, background .12s ease;
  }
  .quiz-opt:hover{border-color:var(--stamp-red);}
  .quiz-opt.selected{border-color:var(--stamp-red); background:#2F5A8514;}
  .quiz-opt input{margin-top:3px; flex:0 0 auto;}
  .quiz-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    padding-top:14px;
    border-top:2px dashed var(--line);
  }
  .quiz-progress{
    font-family:'Nanum Gothic Coding', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }
  .quiz-btn{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:12.5px;
    background:var(--stamp-red);
    color:#F4F2EA;
    border:none;
    padding:9px 16px;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:0.5px;
  }
  .quiz-btn:disabled{background:var(--pencil); cursor:not-allowed;}
  .quiz-btn.ghost{
    background:none;
    color:var(--ink-soft);
    border:1px solid var(--line);
  }
  .quiz-result{
    text-align:center;
    padding:14px 6px 6px;
  }
  .quiz-result .rtype{
    font-family:'Nanum Gothic Coding', monospace;
    font-weight:700;
    font-size:34px;
    color:var(--stamp-red);
    letter-spacing:2px;
    margin-bottom:6px;
  }
  .quiz-result .rdesc{
    font-size:13.5px;
    color:var(--ink-soft);
    line-height:1.6;
    margin-bottom:18px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="masthead">
    <h1>캐릭터 프로필</h1>
    <div class="case-no" id="caseNo">FILE NO. ______</div>
  </div>
  <div class="masthead-sub">
    <span>인물 프로필 · 성격 유형 · 관계도 기록</span>
    <span id="countLabel">등록 인물 0명</span>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" id="tabSheetBtn">조서 작성</button>
    <button class="view-tab" id="tabNetworkBtn">인물관계도</button>
  </div>

  <div class="layout" id="sheetView">
    <!-- 좌측: 인물 목록 -->
    <div class="cabinet">
      <div class="cabinet-title">보관함 · CABINET</div>
      <button class="new-btn" id="newCharBtn">＋ 새 인물 등록</button>
      <div class="folder-list" id="folderList"></div>
      <div class="toolbar">
        <button id="exportBtn">내보내기 (JSON)</button>
        <button id="importBtn">불러오기</button>
        <input type="file" id="importFile" accept="application/json">
      </div>
    </div>

    <!-- 우측: 선택된 인물 조서 -->
    <div id="dossierWrap"></div>
  </div>

  <div class="network-view" id="networkView" style="display:none;"></div>

</div>

<!-- 성격유형 간단 진단 모달 -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-modal" id="quizModal"></div>
</div>

<!-- 삭제 확인 모달 -->
<div class="quiz-overlay" id="confirmOverlay">
  <div class="quiz-modal" style="max-width:380px;">
    <h2>삭제 확인</h2>
    <div class="quiz-sub" id="confirmMsg" style="margin-bottom:0;"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
      <button type="button" class="cancel-btn" id="confirmCancelBtn">취소</button>
      <button type="button" class="del-btn" id="confirmOkBtn" style="margin:0;">삭제</button>
    </div>
  </div>
</div>

<input type="file" id="photoFileInput" accept="image/*">

<script>
(function(){
  const STORAGE_KEY = 'character-dossier-data-v1';
  const MBTI_TYPES = ['ISTJ','ISFJ','INFJ','INTJ','ISTP','ISFP','INFP','INTP','ESTP','ESFP','ENFP','ENTP','ESTJ','ESFJ','ENFJ','ENTJ','미정'];
  const ENN_TYPES = ['1w9','1w2','2w1','2w3','3w2','3w4','4w3','4w5','5w4','5w6','6w5','6w7','7w6','7w8','8w7','8w9','9w8','9w1','미정'];

  let state = load();
  let activeId = state.characters.length ? state.characters[0].id : null;

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){ console.warn('불러오기 실패', e); }
    return { characters: [] };
  }

  function save(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashSaved();
    }catch(e){ console.warn('저장 실패', e); }
  }

  let saveTimer=null;
  function flashSaved(){
    const el = document.getElementById('savedNote');
    if(!el) return;
    el.textContent = '저장됨 · ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }

  function uid(){ return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function newCharacter(){
    return {
      id: uid(),
      name: '',
      source: '',
      photo: '',
      mbti: '미정',
      enneagram: '미정',
      desire: '',
      fear: '',
      voice: '',
      notes: '',
      relations: [] // {target, note}
    };
  }

  function fmtCase(){
    const d = new Date();
    return 'FILE NO. ' + d.getFullYear() + '-' + String(state.characters.length).padStart(3,'0');
  }

  function render(){
    document.getElementById('caseNo').textContent = fmtCase();
    document.getElementById('countLabel').textContent = '등록 인물 ' + state.characters.length + '명';
    renderFolderList();
    renderDossier();
  }

  function renderFolderList(){
    const wrap = document.getElementById('folderList');
    wrap.innerHTML = '';
    if(!state.characters.length){
      wrap.innerHTML = '<div class="empty-cabinet">아직 등록된 인물이 없습니다.<br>“새 인물 등록”으로 첫 조서를 작성하세요.</div>';
      return;
    }
    state.characters.forEach(c=>{
      const tab = document.createElement('div');
      tab.className = 'folder-tab' + (c.id === activeId ? ' active' : '');
      tab.innerHTML = `
        <span class="ft-name">${escapeHtml(c.name) || '(이름 없음)'}</span>
        <span class="ft-meta">${escapeHtml(c.source) || '출처 미상'} · ${c.mbti}</span>
      `;
      tab.addEventListener('click', ()=>{ activeId = c.id; render(); });
      wrap.appendChild(tab);
    });
  }

  function renderDossier(){
    const wrap = document.getElementById('dossierWrap');
    const c = state.characters.find(x=>x.id===activeId);
    if(!c){
      wrap.innerHTML = `
        <div class="dossier">
          <div class="empty-dossier">
            <div class="big">열람할 조서가 없습니다</div>
            새 인물을 등록하면 이곳에 프로필이 표시됩니다.
            <br><button id="emptyNewBtn">＋ 새 인물 등록</button>
          </div>
        </div>`;
      wrap.querySelector('#emptyNewBtn').addEventListener('click', addCharacter);
      return;
    }

    wrap.innerHTML = `
      <div class="dossier">
        <div class="dossier-top">
          <div class="photo-box${c.photo ? ' has-photo' : ''}" id="photoBox">
            ${c.photo
              ? `<img src="${c.photo}" alt="캐릭터 사진"><button type="button" class="photo-remove" id="photoRemoveBtn">삭제</button>`
              : '사진<br>업로드'}
          </div>
          <div class="id-fields">
            <div class="field-row">
              <label>성명</label>
              <input type="text" class="name-input" id="f-name" placeholder="인물 이름" value="${attr(c.name)}">
            </div>
            <div class="field-row">
              <label>출처</label>
              <input type="text" id="f-source" placeholder="작품명" value="${attr(c.source)}">
            </div>
            <div class="stamps">
              <div class="stamp">
                MBTI
                <select id="f-mbti">${MBTI_TYPES.map(t=>`<option value="${t}" ${t===c.mbti?'selected':''}>${t}</option>`).join('')}</select>
                <button type="button" class="diag-btn" id="diagMbtiBtn" title="간단 테스트로 MBTI 진단">간단진단</button>
              </div>
              <div class="stamp alt">
                에니어그램
                <select id="f-enn">${ENN_TYPES.map(t=>`<option value="${t}" ${t===c.enneagram?'selected':''}>${t}</option>`).join('')}</select>
                <button type="button" class="diag-btn" id="diagEnnBtn" title="간단 테스트로 에니어그램 진단">간단진단</button>
              </div>
            </div>
          </div>
        </div>

        <div class="dossier-body">
          <div class="two-col">
            <div class="section">
              <div class="section-head"><span class="tag">01</span><h3>핵심 욕망 — 이 인물이 진짜 원하는 것</h3></div>
              <textarea id="f-desire" placeholder="예: 인정받고 싶다, 아무도 잃고 싶지 않다...">${attr(c.desire)}</textarea>
            </div>
            <div class="section">
              <div class="section-head"><span class="tag">02</span><h3>핵심 두려움 — 무의식중에 피하는 것</h3></div>
              <textarea id="f-fear" placeholder="예: 무능해 보이는 것, 통제력을 잃는 것...">${attr(c.fear)}</textarea>
            </div>
          </div>

          <div class="section">
            <div class="section-head"><span class="tag">03</span><h3>말투 · 어휘 특징</h3></div>
            <textarea id="f-voice" placeholder="말버릇, 어미, 자주 쓰는 표현, 침묵 패턴 등">${attr(c.voice)}</textarea>
          </div>

          <div class="section">
            <div class="section-head"><span class="tag">04</span><h3>관계도</h3></div>
            <div class="quiz-sub" style="margin:0 0 10px;">상대 이름이 등록된 다른 인물과 정확히 일치하면 궁합이 자동으로 표시돼요 (재미로 보는 참고용).</div>
            <div class="rel-list" id="relList"></div>
            <datalist id="charNameList">${state.characters.filter(x=>x.id!==c.id && x.name).map(x=>`<option value="${attr(x.name)}">`).join('')}</datalist>
            <button class="add-rel-btn" id="addRelBtn">＋ 관계 추가</button>
          </div>

          <div class="section">
            <div class="section-head"><span class="tag">05</span><h3>자유 메모</h3></div>
            <textarea id="f-notes" placeholder="장면 아이디어, 대사 초안, 참고 자료 등">${attr(c.notes)}</textarea>
          </div>
        </div>

        <div class="footer-bar">
          <button class="del-btn" id="delBtn">이 조서 삭제</button>
          <span class="saved-note" id="savedNote">저장 대기 중</span>
        </div>
      </div>
    `;

    // bind fields
    bindField('f-name', v=>{c.name=v;});
    bindField('f-source', v=>{c.source=v;});
    bindField('f-desire', v=>{c.desire=v;});
    bindField('f-fear', v=>{c.fear=v;});
    bindField('f-voice', v=>{c.voice=v;});
    bindField('f-notes', v=>{c.notes=v;});

    document.getElementById('f-mbti').addEventListener('change', e=>{
      c.mbti = e.target.value; save(); renderFolderList(); renderRelations(c);
    });
    document.getElementById('f-enn').addEventListener('change', e=>{
      c.enneagram = e.target.value; save();
    });

    document.getElementById('diagMbtiBtn').addEventListener('click', ()=>{ openMbtiQuiz(c); });
    document.getElementById('diagEnnBtn').addEventListener('click', ()=>{ openEnnQuiz(c); });

    document.getElementById('photoBox').addEventListener('click', (e)=>{
      if(e.target.id === 'photoRemoveBtn') return;
      const input = document.getElementById('photoFileInput');
      input.value = '';
      input.onchange = (ev)=>{
        const file = ev.target.files[0];
        if(!file) return;
        if(!file.type.startsWith('image/')){
          alert('이미지 파일만 업로드할 수 있습니다.');
          return;
        }
        if(file.size > 3*1024*1024){
          alert('이미지 용량이 너무 큽니다 (3MB 이하로 올려주세요).');
          return;
        }
        const reader = new FileReader();
        reader.onload = ()=>{
          c.photo = reader.result;
          save(); renderDossier();
        };
        reader.readAsDataURL(file);
      };
      input.click();
    });

    const removeBtn = document.getElementById('photoRemoveBtn');
    if(removeBtn){
      removeBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        c.photo = '';
        save(); renderDossier();
      });
    }

    document.getElementById('delBtn').addEventListener('click', ()=>{
      showConfirm(`'${c.name || '(이름 없음)'}' 조서를 삭제할까요? 되돌릴 수 없습니다.`, ()=>{
        state.characters = state.characters.filter(x=>x.id!==c.id);
        activeId = state.characters.length ? state.characters[0].id : null;
        save(); render();
      });
    });

    document.getElementById('addRelBtn').addEventListener('click', ()=>{
      c.relations.push({target:'', note:''});
      save(); renderRelations(c);
    });

    renderRelations(c);

    function bindField(id, setter){
      const el = document.getElementById(id);
      el.addEventListener('input', e=>{
        setter(e.target.value);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(()=>{ save(); renderFolderList(); }, 400);
      });
    }
  }

  function renderRelations(c){
    const list = document.getElementById('relList');
    if(!list) return;
    list.innerHTML = '';
    if(!c.relations.length){
      list.innerHTML = '<div class="saved-note">등록된 관계가 없습니다.</div>';
      return;
    }
    c.relations.forEach((r, idx)=>{
      const row = document.createElement('div');
      row.className = 'rel-row';
      row.innerHTML = `
        <input type="text" placeholder="상대 인물" value="${attr(r.target)}" list="charNameList">
        <div class="string"></div>
        <input type="text" placeholder="관계 설명 (예: 서로 못 미더워하지만 의지함)" value="${attr(r.note)}">
        <button class="icon-btn" title="삭제">삭제</button>
        <div class="rel-compat"></div>
      `;
      const inputs = row.querySelectorAll('input');
      inputs[0].addEventListener('input', e=>{
        r.target = e.target.value;
        queueSave();
        updateRelBadge(row, r, c);
      });
      inputs[0].addEventListener('change', ()=>{
        syncReciprocalRelation(c, r);
      });
      inputs[1].addEventListener('input', e=>{ r.note = e.target.value; queueSave(); });
      row.querySelector('.icon-btn').addEventListener('click', ()=>{
        c.relations.splice(idx,1); save(); renderRelations(c);
      });
      list.appendChild(row);
      updateRelBadge(row, r, c);
    });
  }

  function syncReciprocalRelation(selfChar, r){
    const selfName = (selfChar.name||'').trim();
    const targetName = (r.target||'').trim();
    if(!selfName || !targetName) return;
    if(targetName.toLowerCase() === selfName.toLowerCase()) return; // 자기 자신 관계는 제외

    const target = state.characters.find(x=>
      x.id !== selfChar.id && x.name && x.name.trim().toLowerCase() === targetName.toLowerCase()
    );
    if(!target) return;

    target.relations = target.relations || [];
    const already = target.relations.some(rr =>
      (rr.target||'').trim().toLowerCase() === selfName.toLowerCase()
    );
    if(already) return;

    target.relations.push({target: selfName, note: ''});
    save();
    if(activeId === target.id) renderRelations(target);
  }

  function updateRelBadge(rowEl, r, selfChar){
    const badge = rowEl.querySelector('.rel-compat');
    if(!badge) return;
    const targetName = (r.target||'').trim().toLowerCase();
    const target = targetName
      ? state.characters.find(x=>x.id!==selfChar.id && x.name && x.name.trim().toLowerCase()===targetName)
      : null;

    if(!target){
      badge.style.display = 'none';
      badge.className = 'rel-compat';
      badge.innerHTML = '';
      return;
    }

    const compat = combinedCompat(selfChar, target);
    badge.style.display = 'flex';
    if(!compat){
      badge.className = 'rel-compat';
      badge.innerHTML = `<span class="compat-na">'${escapeHtml(target.name)}' 등록됨 · MBTI와 에니어그램이 모두 미정이라 궁합을 계산할 수 없어요</span>`;
      return;
    }
    badge.className = 'rel-compat tier-' + compat.tier;
    badge.title = compat.desc + (compat.note ? ' · ' + compat.note : '');

    const mbtiPart = (selfChar.mbti!=='미정' && target.mbti!=='미정') ? `${selfChar.mbti}×${target.mbti}` : null;
    const ennPart = (selfChar.enneagram!=='미정' && target.enneagram!=='미정') ? `${selfChar.enneagram}×${target.enneagram}` : null;
    const idParts = [mbtiPart, ennPart].filter(Boolean).join(' · ');

    badge.innerHTML = `
      <span class="compat-score">${compat.score}%</span>
      <span class="compat-label">${idParts} · ${compat.label}</span>
    `;
  }

  function tierFromScore(score){
    if(score>=85) return {label:'찰떡궁합', tier:'great'};
    if(score>=70) return {label:'좋은 궁합', tier:'good'};
    if(score>=50) return {label:'무난한 궁합', tier:'ok'};
    if(score>=35) return {label:'삐걱이기 쉬움', tier:'bad'};
    return {label:'정반대 스타일', tier:'poor'};
  }

  function enneagramCompat(a, b){
    if(!a || !b || a==='미정' || b==='미정') return null;
    const coreA = parseInt(a[0], 10);
    const coreB = parseInt(b[0], 10);
    if(!coreA || !coreB) return null;

    // 재미로 보는 참고용 지표입니다
    const TRIADS = [[8,9,1],[2,3,4],[5,6,7]]; // 장형 / 가슴형 / 머리형
    const ARROWS = [[1,4],[1,7],[2,4],[2,8],[3,6],[3,9],[5,7],[5,8],[6,9]]; // 통합·분열 방향으로 연결된 번호
    const isAdjacent = (x,y)=>{ const d=Math.abs(x-y); return d===1 || d===8; }; // 원형 배열상 이웃 번호(윙)
    const isArrow = (x,y)=> ARROWS.some(([p,q])=> (p===x&&q===y)||(p===y&&q===x));
    const sameTriad = (x,y)=> TRIADS.some(g=>g.includes(x)&&g.includes(y));

    let score, desc;
    if(coreA===coreB){
      score = 55;
      desc = '같은 유형이라 서로를 깊이 이해하지만, 같은 맹점을 공유하기 쉬워요';
    } else if(isArrow(coreA,coreB)){
      score = 88;
      desc = '스트레스·성장 방향으로 연결된 유형이라 서로에게 강한 영향을 주고받아요';
    } else if(isAdjacent(coreA,coreB)){
      score = 75;
      desc = '이웃한 유형(윙 관계)이라 기질이 비슷해 자연스럽게 잘 통해요';
    } else if(sameTriad(coreA,coreB)){
      score = 58;
      desc = '같은 중심(머리/가슴/장)이라 핵심 동기는 통하지만 결이 다를 수 있어요';
    } else {
      score = 40;
      desc = '서로 다른 결의 유형이라 이해에 시간이 좀 걸릴 수 있어요';
    }

    return {score, desc};
  }

  function combinedCompat(selfChar, target){
    const m = mbtiCompat(selfChar.mbti, target.mbti);
    const e = enneagramCompat(selfChar.enneagram, target.enneagram);
    if(!m && !e) return null;

    let score, descParts = [], note = null;
    if(m && e){
      score = Math.round(m.score*0.5 + e.score*0.5);
      descParts.push('[MBTI] ' + m.desc);
      descParts.push('[에니어그램] ' + e.desc);
    } else if(m && !e){
      score = m.score;
      descParts.push('[MBTI] ' + m.desc);
      note = '에니어그램이 아직 미정이라 MBTI만 반영된 궁합이에요';
    } else {
      score = e.score;
      descParts.push('[에니어그램] ' + e.desc);
      note = 'MBTI가 아직 미정이라 에니어그램만 반영된 궁합이에요';
    }

    const {label, tier} = tierFromScore(score);
    return {score, label, tier, desc: descParts.join(' '), note};
  }

  function scoreToColor(score){
    const s = Math.max(0, Math.min(100, score));
    const hue = s * 1.2; // 0점=빨강(hue 0), 100점=초록(hue 120)
    return `hsl(${hue}, 55%, 42%)`;
  }

  function buildRelationEdges(){
    const edges = [];
    const seen = new Set();
    state.characters.forEach(self=>{
      (self.relations||[]).forEach(r=>{
        const targetName = (r.target||'').trim().toLowerCase();
        if(!targetName) return;
        const target = state.characters.find(x=>x.id!==self.id && x.name && x.name.trim().toLowerCase()===targetName);
        if(!target) return;
        const key = [self.id, target.id].sort().join('::');
        if(seen.has(key)) return;
        seen.add(key);
        const compat = combinedCompat(self, target);
        edges.push({a:self, b:target, compat, note:(r.note||'').trim()});
      });
    });
    return edges;
  }

  function renderNetwork(){
    const wrap = document.getElementById('networkView');
    const chars = state.characters;
    if(!chars.length){
      wrap.innerHTML = '<div class="network-empty">등록된 인물이 없습니다.<br>먼저 "조서 작성" 탭에서 인물을 등록해주세요.</div>';
      return;
    }

    const edges = buildRelationEdges();

    const width = 900, height = 620;
    const cx = width/2, cy = height/2 + 6;
    const R = Math.min(width, height)/2 - 100;
    const nodeR = 34;

    const positions = {};
    chars.forEach((c, i)=>{
      const angle = -Math.PI/2 + i * (2*Math.PI/chars.length);
      positions[c.id] = {
        x: cx + R * Math.cos(angle),
        y: cy + R * Math.sin(angle)
      };
    });

    let svgEdges = '';
    let svgLabels = '';
    edges.forEach(e=>{
      const pa = positions[e.a.id], pb = positions[e.b.id];
      if(!pa || !pb) return;
      const hasCompat = !!e.compat;
      const color = hasCompat ? scoreToColor(e.compat.score) : null;
      const strokeStyle = hasCompat ? `stroke:${color};` : `stroke:var(--line);`;
      const dash = hasCompat ? '' : 'stroke-dasharray="4 4"';
      const midX = (pa.x+pb.x)/2, midY = (pa.y+pb.y)/2;
      const labelText = e.note || (e.compat ? e.compat.label : '궁합 정보 없음');
      const scoreText = hasCompat ? `${e.compat.score}%` : '';

      svgEdges += `<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" style="${strokeStyle}" stroke-width="3" ${dash} opacity="0.85"/>`;
      if(scoreText){
        svgLabels += `<text x="${midX}" y="${midY-6}" text-anchor="middle" class="network-edge-label" font-size="11" style="fill:${color}; paint-order:stroke; stroke:var(--card-bg); stroke-width:4px;">${scoreText}</text>`;
      }
      svgLabels += `<text x="${midX}" y="${midY+9}" text-anchor="middle" class="network-edge-label" font-size="10" style="fill:var(--ink-soft); paint-order:stroke; stroke:var(--card-bg); stroke-width:4px;">${escapeHtml(labelText)}</text>`;
    });

    let svgNodes = '';
    chars.forEach(c=>{
      const p = positions[c.id];
      const initial = (c.name||'?').trim().charAt(0) || '?';
      if(c.photo){
        svgNodes += `
          <clipPath id="clip-${c.id}"><circle cx="${p.x}" cy="${p.y}" r="${nodeR}"/></clipPath>
          <circle cx="${p.x}" cy="${p.y}" r="${nodeR+3}" style="fill:var(--card-bg); stroke:var(--folder-navy); stroke-width:2px;"/>

          <circle cx="${p.x}" cy="${p.y}" r="${nodeR}" style="fill:none; stroke:var(--folder-navy); stroke-width:2px;"/>

      } else {

          <text x="${p.x}" y="${p.y+7}" text-anchor="middle" font-size="20" style="fill:var(--card-bg); font-family:'Noto Serif KR', serif;">${escapeHtml(initial)}</text>
        `;
      }
      svgNodes += `<text x="${p.x}" y="${p.y+nodeR+18}" text-anchor="middle" class="network-node-name" font-size="12" style="fill:var(--ink);">${escapeHtml(c.name || '(이름 없음)')}</text>`;
    });

    wrap.innerHTML = `
      <div class="network-legend">

        ${svgEdges}
        ${svgLabels}
        ${svgNodes}
      </svg>
    `;
  }

  function mbtiCompat(a, b){
    if(!a || !b || a==='미정' || b==='미정' || a.length!==4 || b.length!==4) return null;
    // 축별 가중치: 같을 때 점수 / 다를 때 점수 (재미로 보는 참고용 지표입니다)
    const AX = [
      {same:5,  diff:20}, // E/I — 다르면 에너지 밸런스가 좋음
      {same:25, diff:5},  // S/N — 세계관·소통 방식이 같을수록 잘 통함
      {same:8,  diff:20}, // T/F — 다르면 판단 방식이 서로 보완됨
      {same:10, diff:18}  // J/P — 다르면 생활 리듬에 자극과 균형을 줌
    ];
    let raw = 0;
    for(let i=0;i<4;i++){
      raw += (a[i]===b[i]) ? AX[i].same : AX[i].diff;
    }
    const max = AX.reduce((s,x)=>s+Math.max(x.same,x.diff),0);
    const score = Math.round(raw/max*100);

    let label, tier;
    if(score>=85){label='찰떡궁합'; tier='great';}
    else if(score>=70){label='좋은 궁합'; tier='good';}
    else if(score>=50){label='무난한 궁합'; tier='ok';}
    else if(score>=35){label='삐걱이기 쉬움'; tier='bad';}
    else {label='정반대 스타일'; tier='poor';}

    const parts = [];
    parts.push(a[1]===b[1]
      ? '세계관·정보를 받아들이는 방식(S/N)이 비슷해 대화가 잘 통해요'
      : '세계관(S/N)이 달라 서로의 시야를 넓혀주지만 소통에 공이 좀 들어요');
    parts.push(a[2]===b[2]
      ? '판단 방식(T/F)이 비슷해 편하지만 같은 맹점을 공유할 수 있어요'
      : '판단 방식(T/F)이 달라 서로의 결정을 보완해줘요');
    parts.push(a[3]===b[3]
      ? '생활 리듬(J/P)이 비슷해 합이 잘 맞아요'
      : '생활 리듬(J/P)이 달라 자극이 되지만 부딪힐 수도 있어요');

    return {score, label, tier, desc: parts.join('. ') + '.'};
  }

    const next = n===9?1:n+1;

        if(!data || !Array.isArray(data.characters)) throw new Error('형식 오류');

          state.characters = state.characters.concat(data.characters);

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
</script>
